syntax = "proto3";

package forest.v1;

service RegistryService {
  // --- v1: file-based components ---
  rpc GetComponents(GetComponentsRequest) returns (GetComponentsResponse) {}
  rpc GetComponent(GetComponentRequest) returns (GetComponentResponse) {}
  rpc GetComponentVersion(GetComponentVersionRequest) returns (GetComponentVersionResponse) {}
  rpc BeginUpload(BeginUploadRequest) returns (BeginUploadResponse) {}
  rpc UploadFile(UploadFileRequest) returns (UploadFileResponse) {}
  rpc CommitUpload(CommitUploadRequest) returns (CommitUploadResponse) {}
  rpc GetComponentFiles(GetComponentFilesRequest) returns (stream GetComponentFilesResponse) {}

  // --- v2: binary components ---
  rpc UploadBinary(stream UploadBinaryRequest) returns (UploadBinaryResponse) {}
  rpc DownloadBinary(DownloadBinaryRequest) returns (stream DownloadBinaryResponse) {}
  rpc PublishManifest(PublishManifestRequest) returns (PublishManifestResponse) {}
  rpc GetComponentManifest(GetComponentManifestRequest) returns (GetComponentManifestResponse) {}
  rpc ListComponentVersions(ListComponentVersionsRequest) returns (ListComponentVersionsResponse) {}

  // --- Registry UI / discovery ---
  rpc SearchComponents(SearchComponentsRequest) returns (SearchComponentsResponse) {}
  rpc GetComponentDetail(GetComponentDetailRequest) returns (GetComponentDetailResponse) {}
}

// --- v1 messages (unchanged) ---

message GetComponentsRequest {}
message GetComponentsResponse {}

message GetComponentRequest {
  string name = 1;
  string organisation = 2;
}
message GetComponentResponse {
  optional Component component = 1;
}

message Component {
  string id = 1;
  string version = 2;
}

// ComponentVersion
message GetComponentVersionRequest {
  string name = 1;
  string organisation = 2;
  string version = 3;
}
message GetComponentVersionResponse {
  optional Component component = 1;
}

// BeginUpload

message BeginUploadRequest {
  string name = 1;
  string organisation = 2;
  string version = 3;
}
message BeginUploadResponse {
  string upload_context = 1;
}

message UploadFileRequest {
  string upload_context = 1;
  string file_path = 2;
  bytes file_content = 3;
}
message UploadFileResponse {}

message CommitUploadRequest {
  string upload_context = 1;
}
message CommitUploadResponse {}

// Get component files
message GetComponentFilesRequest {
  string component_id = 1;
}
message GetComponentFilesResponse {
  oneof msg {
    Done done = 1;
    ComponentFile component_file = 2;
  }
}

message ComponentFile {
  string file_path = 1;
  bytes file_content = 2;
}

message Done {}

// --- v2 messages: binary component distribution ---

// UploadBinary — client-streaming upload of a platform-specific binary.
// First message must include metadata (upload_context, os, arch, sha256).
// Subsequent messages contain binary chunks.
message UploadBinaryRequest {
  oneof msg {
    UploadBinaryMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message UploadBinaryMetadata {
  string upload_context = 1;
  string os = 2;     // linux, macos, windows
  string arch = 3;   // amd64, arm64
  string sha256 = 4; // expected SHA-256 hex digest of the full binary
}

message UploadBinaryResponse {
  uint64 size_bytes = 1;
}

// DownloadBinary — server-streaming download of a platform-specific binary.
message DownloadBinaryRequest {
  string organisation = 1;
  string name = 2;
  string version = 3;
  string os = 4;
  string arch = 5;
}

message DownloadBinaryResponse {
  bytes chunk = 1;
}

// PublishManifest — publish the component manifest (capabilities, spec schema, etc.)
message PublishManifestRequest {
  string upload_context = 1;
  string manifest_json = 2; // JSON-encoded ComponentManifest
}
message PublishManifestResponse {}

// GetComponentManifest — retrieve the manifest for a specific version.
message GetComponentManifestRequest {
  string organisation = 1;
  string name = 2;
  string version = 3;
}
message GetComponentManifestResponse {
  string manifest_json = 1;
}

// ListComponentVersions — list all versions of a component with platform info.
message ListComponentVersionsRequest {
  string organisation = 1;
  string name = 2;
}
message ListComponentVersionsResponse {
  repeated ComponentVersionInfo versions = 1;
}

message ComponentVersionInfo {
  string version = 1;
  string protocol_version = 2;
  string kind = 3; // "binary" or "files"
  repeated string platforms = 4; // e.g., ["linux_amd64", "darwin_arm64"]
}

// --- Registry UI / discovery ---

// SearchComponents — search/browse the registry (like crates.io search).
message SearchComponentsRequest {
  string query = 1;              // free-text search (name, description)
  string organisation = 2;       // filter by org (empty = all)
  int32 page = 3;                // pagination (0-indexed)
  int32 page_size = 4;           // items per page (default 20, max 100)
}
message SearchComponentsResponse {
  repeated ComponentSummary components = 1;
  int32 total_count = 2;
}

// ComponentSummary — compact component info for listings.
message ComponentSummary {
  string organisation = 1;
  string name = 2;
  string latest_version = 3;
  string kind = 4;                // "binary" or "files"
  string description = 5;         // from manifest
  string created_at = 6;          // ISO 8601
  string updated_at = 7;          // ISO 8601
  int32 version_count = 8;
  repeated string contracts = 9;  // ["forest/deployment", ...]
  string visibility = 10;         // "public" or "private"
}

// GetComponentDetail — full component page (like crates.io crate page).
message GetComponentDetailRequest {
  string organisation = 1;
  string name = 2;
}
message GetComponentDetailResponse {
  ComponentSummary summary = 1;
  repeated ComponentVersionInfo versions = 2;
  string readme = 3;              // README content (if available)
  string manifest_json = 4;       // latest version manifest
  repeated string owners = 5;     // org members who can publish
}
