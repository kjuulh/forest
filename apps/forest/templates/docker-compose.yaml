  #     - 8080:8080
  #     - '26257:26257'
   
  postgres:
    image: 'postgres:18-alpine'
    restart: 'always'
    shm_size: 128mb
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: 'nats:2-alpine'
    restart: 'always'
    command: ["--http_port", "8222"]
    ports:
      - '4222:4222'
      - '8222:8222'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: 'minio/minio:latest'
    restart: 'always'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: forestdev
      MINIO_ROOT_PASSWORD: forestdevpassword
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio-data:/data

  minio-init:
    image: 'minio/mc:latest'
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 forestdev forestdevpassword;
      mc mb --ignore-existing local/forest;
      exit 0;
      "

volumes:
  minio-data:

