syntax = "proto3";

package forest.v1;

// System liveness check (existing).
service StatusService {
  rpc Status(GetStatusRequest) returns (GetStatusResponse) {}
}

message GetStatusRequest {}
message GetStatusResponse {}

// ── Release health monitoring ──────────────────────────────────────
//
// The ReleaseHealthService accepts health observations from external
// agents. The contract is infrastructure-agnostic — agents observe
// their specific platform (kubernetes, ECS, VMs, etc.) and report
// generic resource health observations.

service ReleaseHealthService {
  // Report a health observation for a release on a specific destination.
  // Called periodically by an agent (every 15-30s or on change).
  rpc ReportHealth(ReportHealthRequest) returns (ReportHealthResponse);

  // Get the current health state for a release intent (all destinations).
  rpc GetReleaseHealth(GetReleaseHealthRequest) returns (GetReleaseHealthResponse);

  // Stream health updates for a release intent.
  rpc WatchReleaseHealth(WatchReleaseHealthRequest) returns (stream ReleaseHealthEvent);
}

// ── Report (agent → server) ────────────────────────────────────────

message ReportHealthRequest {
  // Release identity — how the agent correlates observed resources
  // back to a forest release (e.g. from labels/annotations/tags).
  string release_intent_id = 1;
  string release_id = 2;
  string organisation = 3;
  string project = 4;
  string destination = 5;
  string environment = 6;

  // The observed health state
  HealthObservation observation = 10;
}

message ReportHealthResponse {}

// ── Observation model (infrastructure-agnostic) ────────────────────

message HealthObservation {
  // Individual observed resources
  repeated ResourceHealth resources = 1;

  // When this observation was taken (RFC 3339)
  string observed_at = 2;

  // Overall computed status for this observation
  HealthStatus status = 3;

  // Human-readable summary message
  string message = 4;
}

// A single observed resource's health.
// The meaning of fields depends on the agent — a kubernetes agent
// fills api_version/kind/namespace, while a VM agent might use
// different conventions. The server treats these as opaque observations.
message ResourceHealth {
  // Resource identification
  string kind = 1;       // e.g. "Deployment", "Pod", "Service", "VM"
  string name = 2;       // resource name
  string namespace = 3;  // optional grouping (k8s namespace, region, etc.)

  // Health state
  HealthStatus status = 4;
  string message = 5;

  // Optional key-value properties for resource-specific data.
  // Examples: {"desired_replicas": "3", "ready_replicas": "2"},
  //           {"last_applied_revision": "main@sha1:abc123"}
  map<string, string> properties = 10;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_PROGRESSING = 2;
  HEALTH_STATUS_DEGRADED = 3;
  HEALTH_STATUS_UNHEALTHY = 4;
  HEALTH_STATUS_MISSING = 5;
}

// ── Query (CLI/UI → server) ────────────────────────────────────────

message GetReleaseHealthRequest {
  string release_intent_id = 1;
}

message GetReleaseHealthResponse {
  repeated DestinationHealth destinations = 1;
  HealthStatus aggregate_status = 2;
}

message DestinationHealth {
  string destination = 1;
  string environment = 2;
  HealthObservation latest_observation = 3;
  HealthStatus status = 4;
}

// ── Streaming ──────────────────────────────────────────────────────

message WatchReleaseHealthRequest {
  string release_intent_id = 1;
}

message ReleaseHealthEvent {
  string destination = 1;
  string environment = 2;
  HealthObservation observation = 3;
  HealthStatus status = 4;
}
