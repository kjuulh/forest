[env]
RUST_LOG = "forest=debug,notmad=trace,info"
_.file = ".env"

# Default server for the `forest` CLI (publish, release, etc). Override in
# .env to point at a local server (e.g. http://localhost:4040 for forest-team
# dev work). The runner uses FOREST_SERVER_ADDR — separate variable, not set
# here.
#FOREST_SERVER = "https://api.forest.development.understory.sh"

# CUE registry override — `forest.sh/...` modules resolve from forest's OCI
# registry on the dev server (HTTPS, port 443, terminated at the platform
# ALB; the forest task's HTTP/4042 backend serves /v2/* OCI). Everything
# else falls back to the central CUE registry.
CUE_REGISTRY = "forest.sh=registry.api.forest.development.understory.sh,registry.cuelang.org"

[tools]
rust = { version = "1.93", components = "rust-src,rust-analyzer" }
uv = "latest"

[tasks.todos]
run = "hyperlog --local-path ./todos"

[tasks."forest:install"]
alias = ["i", "install"]
run = "cargo install --path crates/forest -f"

[tasks.forest]
# FOREST_SERVER comes from [env] (default = api.forest.development.understory.sh)
# or from .env (override, e.g. http://localhost:4040 when developing forest).
dir = "{{ cwd }}"
run = "cargo run -p forest -- "

[tasks."forest:my"]
dir = "./examples/my_project"
run = "cargo run -p forest -- "

[tasks."forest:publish"]
dir = "{{ cwd }}"
run = "cargo run -p forest -- components publish"

[tasks."forest:trace:my"]
env = { RUST_LOG = "forest=trace,info" }
dir = "./examples/my_project"
run = "cargo run -p forest -- "

[tasks."forest:trace"]
env = { RUST_LOG = "forest=trace,info" }
dir = "{{cwd}}"
run = "cargo run -p forest -- "

[tasks."develop"]
alias = ["d", "dev"]
env = { RUST_LOG = "forest_server=trace,info" }
run = "cargo run -p forest-server -- serve"

[tasks."build"]
run = "cargo build --release"

[tasks."forest:docker:build"]
run = "docker build -f ./templates/forest.Dockerfile -t docker.io/kasperhermansen/forest:local ."

[tasks."forest-server:docker:build"]
run = "docker build -f ./templates/forest-server.Dockerfile -t docker.io/kasperhermansen/forest-server:local ."

[tasks."docker:build"]
depends = ["forest:docker:build", "forest-server:docker:build"]
run = ""

[tasks."docker:publish"]
depends = "docker:build"
run = """
  echo "building services"
  docker build -f ./templates/forest.Dockerfile -t docker.io/kasperhermansen/forest:main .
  docker build -f ./templates/forest-server.Dockerfile -t docker.io/kasperhermansen/forest-server:main .

  timestamp=$(date +%s)

  docker build -f ./templates/forest.Dockerfile -t docker.io/kasperhermansen/forest:$timestamp .
  docker build -f ./templates/forest-server.Dockerfile -t docker.io/kasperhermansen/forest-server:$timestamp .

  docker push docker.io/kasperhermansen/forest:main
  docker push docker.io/kasperhermansen/forest-server:main

  docker push docker.io/kasperhermansen/forest:$timestamp
  docker push docker.io/kasperhermansen/forest-server:$timestamp
"""

[tasks."dev:init"]
run = """
mise run dev -- admin deploy-component ./components/* --all --quiet
"""

[tasks."local:up"]
run = "docker compose -f ./templates/docker-compose.yaml up -d --remove-orphans"

[tasks."local:down"]
run = "docker compose -f ./templates/docker-compose.yaml down -v"

[tasks."local:logs"]
run = "docker compose -f ./templates/docker-compose.yaml logs -f"

[tasks."db:shell"]
env = { PGPASSWORD = "devpassword" }
run = "psql -h localhost -p 5432 -U devuser -d dev"

[tasks."db:exec"]
env = { PGPASSWORD = "devpassword" }
run = 'psql -h localhost -p 5432 -U devuser -d dev -c {{arg(name="sql")}}'

[tasks."db:migrate"]
depends = ["local:up"]
run = "cargo sqlx migrate run --source ./crates/forest-server/migrations/"

[tasks."db:prepare"]
depends = ["db:migrate"]
run = "cargo sqlx prepare --workspace"

[tasks."k8s:up"]
run = "./scripts/k3d-manager.sh create"

[tasks."k8s:down"]
run = "./scripts/k3d-manager.sh cleanup"

[tasks."k8s:list"]
run = "./scripts/k3d-manager.sh list"

[tasks."flux:test"]
dir = "./examples/rust-podinfo"
run = "./flux-test.sh flux"
description = "Run Flux v2 destination test (in-process, bare git)"

[tasks."flux:runner-test"]
dir = "./examples/rust-podinfo"
run = "./flux-test.sh flux-runner"
description = "Run Flux v2 destination test via distributed runner (no k3d)"

[tasks."k8s:flux:test"]
dir = "./examples/rust-podinfo"
run = "./flux-test.sh k3d-flux"
description = "Run k3d + Flux v2 integration test"

[tasks."k8s:flux:runner-test"]
dir = "./examples/rust-podinfo"
run = "./flux-test.sh k3d-flux-runner"
description = "Run k3d + Flux v2 integration test via distributed runner"

[tasks."k8s:flux:cleanup"]
run = """
k3d cluster delete forest-flux-test 2>/dev/null || true
k3d registry delete forest-test-registry 2>/dev/null || true
docker rm -f forest-gitea 2>/dev/null || true
"""
description = "Clean up k3d flux test resources"

[tasks."docs:serve"]
dir = "./docs"
description = "Serve documentation locally with hot-reload"
run = "uv run --with mkdocs-material mkdocs serve -a 0.0.0.0:8000"

[tasks."docs:build"]
dir = "./docs"
description = "Build documentation site"
run = "uv run --with mkdocs-material mkdocs build"

[tasks.test]
run = "cargo nextest run"

[tasks."test:event-store"]
depends = ["local:up"]
description = "Run forest-event-store integration tests"
run = "cargo nextest run -p forest-event-store"

[tasks."fuzz:event-store"]
dir = "./crates/forest-event-store"
description = "Run forest-event-store fuzz targets (10s each by default)"
run = """
for target in fuzz_event_serde fuzz_aggregate_fold fuzz_hydrate; do
  echo "=== Fuzzing $target ==="
  cargo +nightly fuzz run "$target" -- -max_total_time=${FUZZ_SECONDS:-10}
done
"""


[tasks."generate:proto"]
run = "buf generate"

[tasks."generate"]
alias = ["g", "gen"]
depends = ["generate:proto"]

[tasks."ci:pr"]
run = "cargo run -p ci -- pr"
description = "Run CI PR pipeline via Dagger"

[tasks."ci:main"]
run = "cargo run -p ci -- main"
description = "Run CI main pipeline via Dagger"

# Forest CLI releases are driven by GitHub Actions
# (.github/workflows/release.yml + release-please.yml). No local
# `release` task here — cut a release by merging the auto-generated
# release-please PR on main.
