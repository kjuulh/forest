site_name: Forest
site_description: Composable workflow and release management for teams
site_url: https://forest.sh/docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Authentication: getting-started/authentication.md
      - Your First Project: getting-started/first-project.md
      - Your First Release: getting-started/first-release.md
  - Concepts:
      - concepts/index.md
      - Projects: concepts/projects.md
      - Components: concepts/components.md
      - Environments: concepts/environments.md
      - Destinations: concepts/destinations.md
      - Releases: concepts/releases.md
      - Pipelines: concepts/pipelines.md
      - Triggers: concepts/triggers.md
      - Policies: concepts/policies.md
  - Guides:
      - guides/index.md
      - Authoring Components: guides/authoring-components.md
      - CUE Configuration: guides/cue-configuration.md
      - CI/CD Integration: guides/ci-cd.md
  - Reference:
      - reference/index.md
      - CLI Reference: reference/cli.md
      - CUE Schema Reference: reference/cue-schema.md
      - Configuration Files: reference/configuration-files.md
  - Architecture:
      - architecture/index.md
