[env]
RUST_LOG = "hollow=debug,info"
_.file = "../.env"

[tasks.build]
description = "Build all hollow binaries (debug)"
run = "cargo build --workspace"

[tasks."build:release"]
description = "Build all hollow binaries (release)"
run = "cargo build --workspace --release"

[tasks."build:guest"]
description = "Build hollow-guest (debug, for local dev testing)"
run = "cargo build -p hollow-guest"

[tasks.check]
description = "Check + clippy + fmt"
run = """
cargo fmt --all --check
cargo clippy --workspace -- -D warnings
"""

[tasks."generate:proto"]
description = "Regenerate gRPC code from proto definitions"
run = "buf generate"

[tasks.controller]
description = "Run the hollow controller (connects to forest-server)"
env = { FOREST_SERVER_ADDR = "http://localhost:4040", HOLLOW_LISTEN_ADDR = "[::]:4050", HOLLOW_METRICS_ADDR = "[::]:4051", HOLLOW_MAX_CONCURRENT = "1", HOLLOW_CAPABILITIES = "forest/terraform/1" }
run = "cargo run -p hollow-controller"

[tasks.agent]
description = "Run the hollow agent (connects to controller)"
env = { HOLLOW_CONTROLLER_ADDR = "http://localhost:4050", HOLLOW_DATA_DIR = "/tmp/hollow-agent", HOLLOW_VCPUS = "2", HOLLOW_MEMORY_MIB = "4096" }
run = """
export HOLLOW_GUEST_BIN="$(pwd)/target/debug/hollow-guest"
cargo run -p hollow-agent
"""

[tasks.test]
description = "Run all hollow acceptance tests (smoke + orchestrator) against a KVM host"
# Defaults tuned for local development; override by exporting any of these
# before invoking mise (e.g. `HOLLOW_TEST_HOST=other mise run test`).
env = { HOLLOW_TEST_HOST = "forage-local-agent" }
run = "cargo test -p hollow-acceptance -- --nocapture"

[tasks."test:smoke"]
description = "Direct Firecracker smoke test only (hollow-test-runner, no controller/agent)"
env = { HOLLOW_TEST_HOST = "forage-local-agent" }
run = "cargo test -p hollow-acceptance --test smoke -- --nocapture"

[tasks."test:orchestrator"]
description = "Full controller+agent orchestrator test against the KVM host"
env = { HOLLOW_TEST_HOST = "forage-local-agent" }
run = "cargo test -p hollow-acceptance --test orchestrator -- --nocapture"

[tasks."test:doctor"]
description = "Verify SSH connectivity and KVM availability on HOLLOW_TEST_HOST"
env = { HOLLOW_TEST_HOST = "forage-local-agent" }
run = """
#!/usr/bin/env bash
set -euo pipefail

ssh ${HOLLOW_TEST_KEY:+-i $HOLLOW_TEST_KEY} "$HOLLOW_TEST_HOST" '
  echo "host: $(hostname)"
  echo "kernel: $(uname -r)"
  echo "debian: $(cat /etc/debian_version 2>/dev/null || echo n/a)"
  if [ -e /dev/kvm ]; then
    echo "/dev/kvm: present"
    ls -la /dev/kvm
  else
    echo "/dev/kvm: MISSING — Firecracker cannot run. Enable nested virt on the hypervisor."
    grep -m1 -oE "vmx|svm" /proc/cpuinfo || echo "no virt extensions exposed to the CPU"
    exit 2
  fi
'
"""

[tasks."test:clean"]
description = "Wipe the remote hollow-test cache (forces a fresh bootstrap on next test run)"
env = { HOLLOW_TEST_HOST = "forage-local-agent" }
run = """
#!/usr/bin/env bash
set -euo pipefail
ssh ${HOLLOW_TEST_KEY:+-i $HOLLOW_TEST_KEY} "$HOLLOW_TEST_HOST" 'rm -rf /var/lib/hollow-test'
echo "wiped /var/lib/hollow-test on $HOLLOW_TEST_HOST"
"""

[tasks."images:base"]
description = "Build base rootfs Docker image (requires hollow-guest binary)"
dir = "images"
run = """
echo "==> Building hollow-guest..."
cd ..
cargo build -p hollow-guest --release
cp target/release/hollow-guest images/hollow-guest

echo "==> Building base Docker image..."
cd images
docker build -t hollow-base -f Dockerfile.base .
rm -f hollow-guest
"""

[tasks."images:terraform"]
description = "Build terraform rootfs Docker image"
depends = ["images:base"]
dir = "images"
run = "docker build -t hollow-terraform-v1 -f Dockerfile.terraform-v1 ."

[tasks."images:pack"]
description = "Pack a Docker image into ext4 for Firecracker"
dir = "images"
run = """
mkdir -p out
./scripts/pack-ext4.sh {{arg(name="image")}} out/{{arg(name="output")}} {{arg(name="size", default="2048")}}
"""
