# /etc/containers/containers.conf inside the exec-v1 image.
#
# podman writes network configs, volumes, and event logs at runtime; the
# default paths land on /etc and /var/lib, both of which are on the
# read-only rootfs. Redirect everything writable to /run (64 MiB tmpfs)
# or /var/tmp (256 MiB tmpfs) which the guest sets up on every boot.

[engine]
events_logger = "file"
events_logfile_path = "/run/containers/events.log"

[network]
# netavark/aardvark drop network config + DNS state here on first
# `podman info`. /etc is RO so we send them to /run.
network_config_dir = "/run/containers/networks"
default_network = "podman"
network_backend = "netavark"
