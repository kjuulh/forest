# /etc/containers/storage.conf inside the exec-v1 image.
#
# The Hollow guest rootfs is read-only and Firecracker mounts tmpfs at
# /tmp, /var/tmp, /run, /work — there is no writable path under the
# default `/var/lib/containers/...` location podman wants. We point
# graphroot at /var/tmp (tmpfs, 256 MiB scratch) and runroot at /run
# (tmpfs, 64 MiB), both of which the guest provides on every boot.
#
# Driver: native overlay. The kernel_substrate probe verified
# `overlay` is in /proc/filesystems on the pinned vmlinux-6.1.166, so
# we don't need fuse-overlayfs and don't pay its userspace overhead.

[storage]
driver = "overlay"
runroot = "/run/containers/storage"
graphroot = "/var/tmp/containers/storage"

[storage.options]
additionalimagestores = []

[storage.options.overlay]
mountopt = "nodev,metacopy=on"
