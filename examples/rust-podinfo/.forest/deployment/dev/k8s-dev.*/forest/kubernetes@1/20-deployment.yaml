apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-podinfo
  namespace: rust-podinfo
  labels:
    app.kubernetes.io/name: rust-podinfo
    app.kubernetes.io/managed-by: forest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rust-podinfo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rust-podinfo
    spec:
      containers:
        - name: rust-podinfo
          image: registry.example.com/rawpotion/rust-podinfo
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: internal
              containerPort: 8081
              protocol: TCP
          env:
            - name: "RUST_LOG"
              value: "rust_podinfo=info"
            - name: "RUST_LOG"
              value: "rust_podinfo=debug,info"
            - name: "PODINFO_ENV"
              value: "dev"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3