name: Release Please

# Drives the release flow for the forest CLI.
#
# release-please-config.json declares ONE package rooted at the repo
# root (`.`). That means *every* conventional-commit on main —
# regardless of scope or which path it touched — is considered for a
# version bump. Previously the package was scoped to
# `apps/forest/crates/forest`, which meant install-script / CI /
# README / forage commits silently never triggered a release; that's
# fixed here by widening the path.
#
# Because `release-type: simple` doesn't know about Cargo.toml, the
# config uses `extra-files` to bump
# `apps/forest/crates/forest/Cargo.toml`'s `$.package.version`. The
# `release.yml` workflow's `cargo update -p forest` step then syncs
# `apps/forest/Cargo.lock` to match. CHANGELOG stays at
# `apps/forest/crates/forest/CHANGELOG.md`.
#
# Merging the release-please PR creates a `v<version>` tag and
# publishes a GitHub release; `release.yml` then takes over to build
# the cross-platform binaries and attach install.sh.
#
# The GitHub App token (BREW_APP_ID / BREW_SSH_KEY) authenticates the
# action. Its installation must include the `forest` repository — an
# org-admin one-time setting.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.BREW_APP_ID }}
          private-key: ${{ secrets.BREW_SSH_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}
