name: Release

# Builds the forest CLI for the platforms Homebrew needs, attaches
# tarballs + SHA256 sums to the GitHub release, then regenerates
# `Formula/forest.rb` in understory-io/homebrew-tap so
# `brew install understory-io/tap/forest` picks up the new version.
#
# Triggered by `release-please.yml` publishing a release after a merge
# of its auto-generated release PR. The release tag is in the form
# `v<X.Y.Z>` (no component prefix, see release-please-config.json).
#
# This workflow intentionally builds ONLY the `forest` CLI — not
# `forest-server` (server-side, has private git deps) and not the
# `forage` BFF (Docker images for both are published separately by
# ci.yaml). The `forest` crate has no private deps and is cheap to
# build natively on each target.
#
# Windows builds are intentionally omitted — Homebrew has no Windows
# story, and the CLI's primary distribution channel here is Homebrew.
# Windows users can build from source until a Scoop / Chocolatey
# manifest is set up.

on:
  release:
    types: [published]
  # Dry-run on PRs that could affect the release build. Same matrix,
  # same SSH setup, same compile — just no upload + no formula push.
  # Catches things like a new private git dep showing up in the
  # workspace lockfile (which forced us into SSH-auth here to begin
  # with) BEFORE a tag goes out the door.
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "apps/forest/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: forest
  CARGO_DIR: apps/forest
  # Make cargo shell out to `git` for fetches so it picks up the SSH
  # agent + the global insteadOf rule below — same convention as
  # ci.yaml. Without this cargo uses libgit2 internally and can't talk
  # to a deploy-key-protected private repo (canopy-util-rs as of 2026-05).
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # SSH auth for private git deps (canopy-otel etc.). Same
      # pattern the Dockerfile and ci.yaml use: load the deploy key
      # into the agent, then rewrite https→ssh globally so cargo's
      # git-fetch-with-cli mode talks SSH to github.com. Without
      # this `cargo build --locked -p forest` still tries to fetch
      # other workspace members' private git deps during lockfile
      # validation.
      - name: Setup ssh agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.HB_GITHUB_SSH_KEY }}
      - name: Setup git for private auth
        run: |
          git config --global url."ssh://git@github.com".insteadOf https://github.com
          mkdir -p -m 0600 ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Match ci.yaml's Rust pin (1.93 via mise/tools). Using mise here
      # avoids drift between CI and local development. The action also
      # caches rustup downloads between runs.
      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # All three matrix targets are *native* to their runner, so no
      # `rustup target add` is needed. If the matrix grows to include
      # cross-compiled targets (e.g. x86_64-apple-darwin on
      # macos-latest arm), add a `rustup target add ${{ matrix.target }}`
      # step here.

      # release-please bumps `apps/forest/crates/forest/Cargo.toml`
      # but doesn't touch `apps/forest/Cargo.lock` — its rust strategy
      # looks for a lockfile next to the package, not up the tree at
      # the workspace root. The version delta breaks `--locked` builds.
      # Refresh just the forest entry (without pulling new external
      # versions) so `cargo build --locked` accepts the lockfile.
      - name: Sync lockfile after release-please version bump
        working-directory: ${{ env.CARGO_DIR }}
        # `-p forest` re-resolves *only* the forest crate entry in
        # Cargo.lock. External dep versions stay pinned — this is just
        # to update the `version = "X.Y.Z"` field on the forest entry
        # to match the bumped Cargo.toml. Idempotent in normal pushes.
        run: cargo update -p forest

      - name: Build
        working-directory: ${{ env.CARGO_DIR }}
        env:
          # forest CLI does not use sqlx but other workspace members
          # do; set this defensively so a future workspace-level
          # build.rs doesn't fail on the lack of a database.
          SQLX_OFFLINE: "true"
        run: cargo build --release --locked --target ${{ matrix.target }} -p forest

      # Tag name is set on `release: published`; absent on PR /
      # workflow_dispatch dry runs. Fall back to the short SHA so the
      # artifact has a stable name during dry-runs.
      - name: Resolve release ref
        id: ref
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        working-directory: ${{ env.CARGO_DIR }}
        run: |
          ARTIFACT="${BINARY_NAME}-${{ steps.ref.outputs.name }}-${{ matrix.target }}.tar.gz"
          tar czf "$ARTIFACT" -C target/${{ matrix.target }}/release "${BINARY_NAME}"
          shasum -a 256 "$ARTIFACT" > "${ARTIFACT}.sha256"
          # Surface absolute paths to the upload step.
          echo "ARTIFACT_PATH=${PWD}/${ARTIFACT}" >> "$GITHUB_ENV"
          echo "CHECKSUM_PATH=${PWD}/${ARTIFACT}.sha256" >> "$GITHUB_ENV"

      - name: Upload to release
        # Only on real release publish. PR / manual dry runs build the
        # tarball but stop here.
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${ARTIFACT_PATH}" \
            "${CHECKSUM_PATH}"

  update-homebrew:
    needs: [build]
    # Only push a new formula on real releases. Dry-runs (PR /
    # workflow_dispatch) stop after the build matrix.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sha256" \
            --dir checksums

      - name: Generate formula
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BINARY_NAME="forest"

          # Strip filename + whitespace; keep only the hex digest.
          get_sha() {
            grep "$1" checksums/*.sha256 | awk '{print $1}'
          }

          SHA_DARWIN_ARM=$(get_sha "aarch64-apple-darwin")
          SHA_LINUX_AMD=$(get_sha "x86_64-unknown-linux-gnu")
          SHA_LINUX_ARM=$(get_sha "aarch64-unknown-linux-gnu")

          cat > forest.rb <<FORMULA
          class Forest < Formula
            desc "Codify your development workflows: CI, deployments, and component sharing"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/${TAG}/${BINARY_NAME}-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${REPO}/releases/download/${TAG}/${BINARY_NAME}-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "https://github.com/${REPO}/releases/download/${TAG}/${BINARY_NAME}-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_AMD}"
              end
            end

            def install
              bin.install "${BINARY_NAME}"
            end

            test do
              # Smoke test: the binary should at least print its
              # version. The exact format is "forest <semver>" from
              # clap's default --version handler, so just match the
              # name and the version we just installed.
              assert_match version.to_s, shell_output("#{bin}/${BINARY_NAME} --version")
            end
          end
          FORMULA

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.BREW_APP_ID }}
          private-key: ${{ secrets.BREW_SSH_KEY }}
          owner: understory-io
          repositories: homebrew-tap

      - name: Push to homebrew-tap
        run: |
          git clone "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/understory-io/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp forest.rb tap/Formula/forest.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/forest.rb
          # Allow empty in case nothing changed (re-running on the same
          # tag after a manual edit). The commit message references the
          # release for traceability.
          git commit -m "Update forest to ${{ github.event.release.tag_name }}" || echo "no changes"
          git push
