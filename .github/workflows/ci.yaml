name: ci

on:
  push:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: build and push ${{ matrix.app }}
    runs-on:
      group: 32xlarge

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: forest
            context: apps/forest
            image: ghcr.io/${{ github.repository_owner }}/forest
          - app: forage
            context: apps/forage
            image: ghcr.io/${{ github.repository_owner }}/forage

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract short SHA
        id: sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Extract branch name
        id: branch
        run: echo "BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_ENV

      - name: Setup ssh agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.HB_GITHUB_SSH_KEY }}
      - name: Setup git for private auth
        run: |
          git config --global url."ssh://git@github.com".insteadOf https://github.com && \
          mkdir -p -m 0600 ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag list
        id: image_tags
        run: |
          tags="${{ matrix.image }}:${{ env.BRANCH_NAME }}-${{ env.SHORT_SHA }}"
          tags="$tags"$'\n'"${{ matrix.image }}:${{ env.BRANCH_NAME }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tags="$tags"$'\n'"${{ matrix.image }}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          ssh: |
            default=${{ env.SSH_AUTH_SOCK }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
