version: 2

before:
  hooks:
    - cargo install --locked cargo-zigbuild

builds:
  - id: forest
    builder: rust
    binary: forest
    dir: .
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    flags:
      - --release
      - -p=forest
    env:
      - SQLX_OFFLINE=true

archives:
  - id: forest
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

gitea_urls:
  api: https://git.kjuulh.io/api/v1
  download: https://git.kjuulh.io
  skip_tls_verify: false

release:
  gitea:
    owner: kjuulh
    name: forest
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  mode: keep-existing
