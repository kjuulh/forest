  postgres:
    image: 'postgres:18-alpine'
    restart: 'always'
    shm_size: 128mb
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: 'nats:2-alpine'
    restart: 'always'
    command: ["--http_port", "8222"]
    ports:
      - '4222:4222'
      - '8222:8222'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

